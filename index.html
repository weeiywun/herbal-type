<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>惟元蔘藥｜草本靈魂檢測</title>
    <style>
        :root {
            --primary: #4F6B58;
            --secondary: #D4A373;
            --bg: #F5F5DC;
            --white: #FFFFFF;
            --text: #3E4A3D;
            --accent: #E9EDC6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'PingFang TC', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        #quiz-app { width: 100%; max-width: 450px; background: var(--white); padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); align-self: center; }
        .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 30px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s ease; }
        .q-card { display: none; }
        .q-card.active { display: block; animation: slideIn 0.4s ease-out; }
        h2 { font-size: 1.3rem; line-height: 1.5; margin-bottom: 25px; color: var(--primary); font-weight: 700; }
        .btn-option { display: block; width: 100%; padding: 18px 22px; margin-bottom: 15px; border: 1.5px solid #F0F0F0; border-radius: 18px; background: #FAFAFA; cursor: pointer; transition: 0.2s; font-size: 1rem; text-align: left; color: var(--text); }
        .btn-option:hover { background-color: var(--accent); }
        #result-page { display: none; text-align: center; }
        .result-name { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .result-img { width: 180px; height: 180px; background: var(--bg); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 80px; border: 6px solid #FFF; }
        .stat-box { text-align: left; margin: 25px 0; }
        .bar-outer { width: 100%; height: 24px; background: #F0F0F0; border-radius: 12px; margin: 8px 0 15px; overflow: hidden; }
        .bar-inner { height: 100%; width: 0%; transition: 1.5s ease; }
        .advice-card { text-align: left; background: #FDFDF9; border-left: 5px solid var(--primary); padding: 15px; border-radius: 0 15px 15px 0; font-size: 0.95rem; line-height: 1.7; }
        .btn-retry { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="quiz-app">
    <div id="quiz-ui">
        <div class="progress-container"><div class="progress-fill" id="progress"></div></div>
        <div id="quiz-body"></div>
    </div>

    <div id="result-page">
        <div style="color:var(--secondary); font-weight:bold;">你的草本靈魂是</div>
        <div class="result-name" id="res-name">載入中</div>
        <div class="result-img" id="res-emoji">🌿</div>
        
        <div class="stat-box">
            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                <span id="main-label">主要構成</span><span id="main-pct">0%</span>
            </div>
            <div class="bar-outer"><div class="bar-inner" id="main-bar" style="background:var(--primary)"></div></div>
            
            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                <span id="sub-label">次要構成</span><span id="sub-pct">0%</span>
            </div>
            <div class="bar-outer"><div class="bar-inner" id="sub-bar" style="background:var(--secondary)"></div></div>
        </div>

        <div class="advice-card" id="res-advice"></div>
        <button class="btn-retry" onclick="location.reload()">重新測驗</button>
        <p style="color:#D4A373; font-weight:bold; margin-top:20px;">🎁 折扣碼：WEIYUAN88</p>
    </div>
</div>

<script>
    const questions = [
        { q: "下午 3:30 的辦公室，你最誠實的身體感受是？", 
          opts: [ {t:"說話變費力，只想安靜當廢物", s:"qi"}, {t:"胸口悶想大口嘆氣，坐不住", s:"yu"}, {t:"眼睛乾澀想流淚，心裡浮躁", s:"yin"}, {t:"思緒清晰，不需要靠咖啡", s:"ping"} ] },
        { q: "在冷氣房待了一整天，下班時你的狀態是？", 
          opts: [ {t:"手腳凍得像冰棒，關節僵硬", s:"yang"}, {t:"噴嚏鼻水大爆發，皮膚乾癢", s:"special"}, {t:"全身出油嚴重，感覺油膩", s:"heat"} ] },
        { q: "剛吃完一頓豐盛大餐，你的腸胃會告訴你：", 
          opts: [ {t:"肚子脹得像氣球，食物卡著", s:"qi"}, {t:"隔天口苦口臭，立刻長痘", s:"heat"}, {t:"消化神速，一小時後恢復輕盈", s:"ping"} ] },
        { q: "面對一杯滿滿冰塊的飲料，你的反應是？", 
          opts: [ {t:"喝完沒多久，肚子隱痛想上廁所", s:"yang"}, {t:"喝完還是口渴，感覺沒吸收", s:"yin"}, {t:"喉嚨黏膩感加重，痰變多了", s:"tan"} ] },
        { q: "早起睜開眼的那一刻，你的第一個感覺是？", 
          opts: [ {t:"沈重得像裹著濕毛巾，臉腫感", s:"tan"}, {t:"猛然站起會眼冒金星，心慌感", s:"xue"}, {t:"雖然睡飽了，電力僅剩 5%", s:"qi"} ] },
        { q: "深夜躺在床上準備入睡時，你的大腦在？", 
          opts: [ {t:"瘋狂重播對話，煩惱明天之事", s:"yu"}, {t:"夢多到像連環影集，醒來心煩", s:"xue"}, {t:"意識斷片，五分鐘內深度睡眠", s:"ping"} ] },
        { q: "到了晚上換鞋時，你對腳部的觀察是？", 
          opts: [ {t:"襪痕深到消不掉，鞋子變緊", s:"tan"}, {t:"出現不明原因的青紫色瘀青", s:"xue"}, {t:"腳踝線條分明，沒有水腫", s:"ping"} ] },
        { q: "你平時「流汗」的狀態，最接近以下哪種？", 
          opts: [ {t:"稍微動一下就大汗淋漓", s:"qi"}, {t:"汗液黏膩汗味重，白衣發黃", s:"heat"}, {t:"很難出汗，感覺熱氣鎖在皮膚下", s:"xue"} ] },
        { q: "遇到突如其來的壓力時，你的第一反應是？", 
          opts: [ {t:"喉嚨像被卡住，嘆氣連連", s:"yu"}, {t:"臉色煞白，手腳冰冷且心慌手抖", s:"qi"}, {t:"呼吸穩定，能快速冷靜處理", s:"ping"} ] },
        { q: "如果用一種自然景觀形容脾氣，你覺得是？", 
          opts: [ {t:"終日不散的濃霧，細膩但憂鬱", s:"yu"}, {t:"隨時爆發的活火山，遇事炸開", s:"heat"}, {t:"平靜的湖面，適應力極強", s:"ping"} ] },
        { q: "難得進行一場暢汗淋漓的運動，隔天你是？", 
          opts: [ {t:"肌肉痠痛僵硬持續3天以上", s:"xue"}, {t:"累到靈魂出竅，連滑手機都沒力", s:"qi"}, {t:"像排掉一桶廢水，輕盈極了", s:"tan"} ] },
        { q: "在運動過程中，哪種情況最常困擾你？", 
          opts: [ {t:"剛開始5分鐘就氣喘吁吁", s:"qi"}, {t:"暖身要很久，否則容易抽筋", s:"yang"}, {t:"身體像過熱引擎，燥熱難耐", s:"yin"} ] }
    ];

    const personas = {
        ping: { n: "高麗蔘隊長", e: "🌲", a: "你是極致平衡的靈魂！維持規律運動與高品質蔘飲是你的長青秘訣。" },
        qi: { n: "元氣黃耆君", e: "🔋", a: "電力容易見底，別再報復性運動。參參元氣茶是你隨身的充電寶。" },
        yang: { n: "肉桂暖心大叔", e: "🔥", a: "外冷內熱，需要暖身更暖心。多曬太陽運動，讓熱力循環起來。" },
        yin: { n: "石斛小仙女", e: "💧", a: "身體正在喊渴，熬夜是大忌。游泳或溫和伸展能幫你鎖住水分。" },
        tan: { n: "茯苓除濕官", e: "☁️", a: "沈重感來自積水。多做有氧運動流點微汗，找回輕盈輪廓。" },
        heat: { n: "決明子排毒師", e: "✨", a: "體內火氣大，爆汗型運動最適合你洩火，記得補水要小口飲。" },
        xue: { n: "當歸補血員", e: "❤️", a: "能量燃料不足。先補足氣血再重訓，臉色才會紅潤有光。" },
        yu: { n: "薄荷舒壓師", e: "🌿", a: "壓力悶在胸口了！慢跑或擴胸運動能幫你把悶氣排出來。" },
        special: { n: "特稟小精靈", e: "🧚", a: "你是敏感的2%，環境變化影響大。建立防護屏障是首要任務。" }
    };

    let currentIdx = 0;
    let scores = { ping:0, qi:0, yang:0, yin:0, tan:0, heat:0, xue:0, yu:0, special:0 };

    function renderQuestion() {
        const quizBody = document.getElementById('quiz-body');
        const q = questions[currentIdx];
        let html = `<div class="q-card active"><h2>${q.q}</h2>`;
        q.opts.forEach(opt => {
            html += `<button class="btn-option" onclick="handleChoice('${opt.s}')">${opt.t}</button>`;
        });
        html += `</div>`;
        quizBody.innerHTML = html;
        document.getElementById('progress').style.width = ((currentIdx + 1) / questions.length * 100) + '%';
    }

    window.handleChoice = function(key) {
        scores[key] += 4;
        currentIdx++;
        if (currentIdx < questions.length) {
            renderQuestion();
        } else {
            showResult();
        }
    };

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';

        let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        let mainKey = sorted[0][0];
        let subKey = sorted[1][0];

        const main = personas[mainKey];
        const sub = personas[subKey];

        document.getElementById('res-name').innerText = main.n;
        document.getElementById('res-emoji').innerText = main.e;
        document.getElementById('res-advice').innerHTML = `<strong>主編悄悄話：</strong><br>${main.a}`;
        
        // 隨機分配比例使其看起來更精密
        let mainPct = 65 + Math.floor(Math.random() * 20);
        document.getElementById('main-label').innerText = main.n;
        document.getElementById('main-pct').innerText = mainPct + '%';
        document.getElementById('sub-label').innerText = sub.n;
        document.getElementById('sub-pct').innerText = (100 - mainPct) + '%';

        setTimeout(() => {
            document.getElementById('main-bar').style.width = mainPct + '%';
            document.getElementById('sub-bar').style.width = (100 - mainPct) + '%';
        }, 100);
    }

    renderQuestion();
</script>

</body>
</html>
