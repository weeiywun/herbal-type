<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>惟元蔘藥｜草本靈魂檢測</title>
    <link rel="icon" type="image/png" href="https://duk.tw/9kW5aQ.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* ─── CSS Variables ─────────────────────────────────────────── */
        :root {
            --ink:       #1E2A1E;
            --forest:    #2E4230;
            --sage:      #4A6741;
            --gold:      #B8955A;
            --gold-lt:   #D4AF78;
            --parchment: #F7F3EC;
            --cream:     #FBF9F5;
            --mist:      #EAE6DC;
            --white:     #FFFFFF;
            --border:    rgba(74,103,65,0.15);

            --serif: 'Noto Serif TC', 'Songti SC', serif;
            --display: 'Playfair Display', 'Noto Serif TC', serif;

            --radius: 14px;
            --shadow: 0 8px 40px rgba(30,42,30,0.10);
            --shadow-sm: 0 2px 12px rgba(30,42,30,0.07);
        }

        /* ─── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: var(--serif);
            background: var(--parchment);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Botanical background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(74,103,65,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 90% 80%, rgba(184,149,90,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grid texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234A6741' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ─── App Shell ─────────────────────────────────────────────── */
        #app {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        /* ─── Pages ─────────────────────────────────────────────────── */
        .page {
            display: none;
            animation: fadeUp 0.6s ease both;
        }
        .page.active { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════════════════════════
           INTRO PAGE
        ═══════════════════════════════════════════════════════════════ */
        #intro-page {
            text-align: center;
        }

        .brand-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .brand-header {
            background: var(--forest);
            padding: 42px 36px 36px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative circle motifs */
        .brand-header::before,
        .brand-header::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(212,175,120,0.2);
        }
        .brand-header::before { width: 280px; height: 280px; top: -120px; right: -80px; }
        .brand-header::after  { width: 180px; height: 180px; bottom: -90px; left: -50px; }

        .brand-emblem {
            font-size: 52px;
            margin-bottom: 14px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .brand-sub {
            font-size: 0.72rem;
            color: var(--gold);
            letter-spacing: 5px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-title {
            font-family: var(--display);
            font-size: 1.75rem;
            color: var(--white);
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: 0.25em;
            white-space: nowrap;
        }

        .brand-title span {
            display: block;
            font-family: var(--display);
            font-size: 0.72rem;
            font-weight: 400;
            color: rgba(255,255,255,0.65);
            margin-top: 8px;
            letter-spacing: 0.18em;
        }

        .intro-body {
            padding: 32px 32px 28px;
        }

        .quiz-meta {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .meta-icon {
            width: 40px; height: 40px;
            background: var(--parchment);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            border: 1px solid var(--border);
        }

        .meta-label {
            font-size: 0.72rem;
            color: var(--sage);
            letter-spacing: 1px;
        }

        .intro-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.85;
            text-align: left;
            background: var(--parchment);
            border-radius: 10px;
            padding: 18px 20px;
            border-left: 3px solid var(--gold);
            margin-bottom: 28px;
        }

        /* Disclaimer section */
        .disclaimer {
            font-size: 0.72rem;
            color: #999;
            line-height: 1.6;
            text-align: center;
            padding: 0 16px 20px;
        }

        /* ─── CTA Button ─────────────────────────────────────────────── */
        .btn-cta {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 100%);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: var(--serif);
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 20px rgba(46,66,48,0.35);
        }

        .btn-cta::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%,-50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn-cta:active::after { width: 300px; height: 300px; }
        .btn-cta:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(46,66,48,0.3); }

        /* ═══════════════════════════════════════════════════════════════
           QUIZ PAGE
        ═══════════════════════════════════════════════════════════════ */
        #quiz-page {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ─── Quiz Header ────────────────────────────────────────────── */
        .quiz-header {
            background: var(--forest);
            padding: 20px 24px 0;
        }

        .quiz-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: rgba(255,255,255,0.75);
            font-family: var(--serif);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 14px 6px 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .btn-back:hover, .btn-back:active {
            background: rgba(255,255,255,0.15);
            color: var(--white);
        }
        .btn-back[hidden] { display: none; }

        .q-counter {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .q-counter strong {
            color: var(--white);
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* ─── Step Progress ──────────────────────────────────────────── */
        .step-track {
            display: flex;
            gap: 4px;
            padding-bottom: 20px;
        }

        .step-dot {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            transition: background 0.4s ease;
        }

        .step-dot.done { background: var(--gold); }
        .step-dot.current { background: rgba(212,175,120,0.6); }

        /* ─── Question Body ──────────────────────────────────────────── */
        .quiz-body {
            padding: 28px 24px 24px;
            min-height: 420px;
        }

        /* Question slide container */
        #q-slide-container {
            position: relative;
        }

        .q-slide {
            animation: slideIn 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .q-slide.reverse {
            animation: slideInReverse 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInReverse {
            from { opacity: 0; transform: translateX(-30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(-30px); }
        }

        @keyframes slideOutReverse {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(30px); }
        }

        .q-slide.leaving {
            animation: slideOut 0.3s ease forwards;
        }

        .q-slide.leaving-reverse {
            animation: slideOutReverse 0.3s ease forwards;
        }

        /* Question illustration */
        .q-visual {
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, var(--parchment) 0%, var(--mist) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
        }

        .q-visual-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .q-visual-emoji {
            font-size: 44px;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.1));
        }

        .q-visual-label {
            font-size: 0.65rem;
            color: var(--sage);
            letter-spacing: 4px;
            font-weight: 500;
        }

        /* Question text */
        .q-text {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.65;
            color: var(--ink);
            margin-bottom: 22px;
        }

        /* ─── Option Buttons ─────────────────────────────────────────── */
        .opts-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-opt {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 15px 18px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--cream);
            cursor: pointer;
            text-align: left;
            font-family: var(--serif);
            font-size: 0.9rem;
            color: var(--ink);
            line-height: 1.5;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        .opt-badge {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--parchment);
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--sage);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-opt:hover,
        .btn-opt:active {
            background: var(--forest);
            border-color: var(--forest);
            color: var(--white);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(46,66,48,0.2);
        }

        .btn-opt:hover .opt-badge,
        .btn-opt:active .opt-badge {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
            color: var(--white);
        }

        .btn-opt.selected {
            background: var(--forest);
            border-color: var(--forest);
            color: var(--white);
        }

        .btn-opt.selected .opt-badge {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--white);
        }

        /* ═══════════════════════════════════════════════════════════════
           RESULT PAGE
        ═══════════════════════════════════════════════════════════════ */
        #result-page {
            /* nothing here, cards handle bg */
        }

        /* ─── Result Header Card ─────────────────────────────────────── */
        .result-top-card {
            background: var(--forest);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            padding: 28px 20px 20px;
            position: relative;
            margin-bottom: 16px;
        }

        .result-char-img-wrap {
            margin-top: 20px;
            border-radius: 14px;
            overflow: hidden;
            line-height: 0;
        }

        .result-char-card {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .result-top-card::before {
            content: '';
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(212,175,120,0.15);
            top: -140px; right: -100px;
        }

        .result-top-card::after {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(212,175,120,0.1);
            bottom: -80px; left: -60px;
        }

        .result-scan-label {
            font-size: 0.68rem;
            color: var(--gold);
            letter-spacing: 5px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .result-persona-type {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .result-persona-name {
            font-family: var(--display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }

        .result-persona-name::after {
            content: '';
            display: block;
            width: 40px; height: 2px;
            background: var(--gold);
            margin: 14px auto 0;
        }

        /* ─── Stats Card ─────────────────────────────────────────────── */
        .result-stats-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .card-section-title {
            font-size: 0.7rem;
            color: var(--sage);
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .stat-row {
            margin-bottom: 20px;
        }

        .stat-row:last-child { margin-bottom: 0; }

        .stat-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .stat-persona {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--ink);
        }

        .stat-role {
            font-size: 0.7rem;
            color: #999;
            margin-right: auto;
            margin-left: 8px;
        }

        .stat-pct {
            font-family: var(--display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--forest);
        }

        .bar-track {
            height: 8px;
            background: var(--parchment);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0;
            border-radius: 4px;
            transition: width 1.6s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        /* ─── Advice Card ────────────────────────────────────────────── */
        .result-advice-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .advice-content {
            font-size: 0.92rem;
            line-height: 1.95;
            color: #444;
            padding: 18px;
            background: var(--parchment);
            border-radius: 10px;
            border-left: 3px solid var(--gold);
        }

        .advice-content strong {
            color: var(--forest);
            display: block;
            margin-bottom: 8px;
            font-size: 0.82rem;
            letter-spacing: 1px;
        }

        /* ─── Promo Card ─────────────────────────────────────────────── */
        .promo-card {
            background: linear-gradient(135deg, var(--forest) 0%, #1E3020 100%);
            border-radius: 16px;
            padding: 22px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .promo-card::before {
            content: '';
            position: absolute;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            top: -60px; right: -40px;
        }

        .promo-label {
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .promo-code {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 4px;
            background: rgba(255,255,255,0.1);
            border: 1.5px dashed rgba(212,175,120,0.4);
            border-radius: 8px;
            padding: 10px 20px;
            display: inline-block;
            margin: 10px 0;
        }

        .promo-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.55);
        }

        /* ─── Retry Button ───────────────────────────────────────────── */
        .btn-retry {
            display: block;
            width: 100%;
            padding: 18px;
            border: 2px solid var(--forest);
            border-radius: var(--radius);
            background: transparent;
            font-family: var(--serif);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--forest);
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .btn-retry:hover,
        .btn-retry:active {
            background: var(--forest);
            color: var(--white);
        }

        /* ─── Share Row ──────────────────────────────────────────────── */
        .share-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn-share {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-family: var(--serif);
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--forest);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-share:active {
            transform: scale(0.97);
        }

        /* ═══════════════════════════════════════════════════════════════
           LOADING STATE
        ═══════════════════════════════════════════════════════════════ */
        #loading-page {
            text-align: center;
            padding: 60px 30px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .loader-ring {
            width: 64px; height: 64px;
            border: 3px solid var(--mist);
            border-top-color: var(--forest);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 0.85rem;
            color: var(--sage);
            letter-spacing: 3px;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* ─── Utility ────────────────────────────────────────────────── */
        .mt-12 { margin-top: 12px; }
    </style>
</head>
<body>
<div id="app">

    <!-- ═══════════ INTRO PAGE ═══════════ -->
    <div id="intro-page" class="page active">

/* ─────────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────────── */
let currentIdx = 0;
let scores = { ping:0, qi:0, yang:0, yin:0, tan:0, heat:0, xue:0, yu:0, special:0 };
let history = []; // 每題已選的 scoreObj，用於返回時扣分
const BADGE = ['A','B','C','D'];

/* ─────────────────────────────────────────────────────────────
   PAGE ROUTING
───────────────────────────────────────────────────────────── */
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = document.getElementById(id);
    el.classList.add('active');
    el.style.animation = 'none';
    requestAnimationFrame(() => {
        el.style.animation = '';
    });
}

/* ─────────────────────────────────────────────────────────────
   INTRO → QUIZ
───────────────────────────────────────────────────────────── */
function startQuiz() {
    buildStepTrack();
    renderQuestion(0);
    showPage('quiz-page');
}

/* ─────────────────────────────────────────────────────────────
   STEP TRACK
───────────────────────────────────────────────────────────── */
function buildStepTrack() {
    const track = document.getElementById('step-track');
    track.innerHTML = questions.map((_,i) => `<div class="step-dot" id="dot-${i}"></div>`).join('');
}

function updateStepTrack(idx) {
    questions.forEach((_,i) => {
        const dot = document.getElementById(`dot-${i}`);
        if(!dot) return;
        dot.className = 'step-dot' + (i < idx ? ' done' : (i === idx ? ' current' : ''));
    });
    document.getElementById('q-num').textContent = idx + 1;

    // 第一題隱藏返回按鈕
    const backBtn = document.getElementById('btn-back');
    if(backBtn) backBtn.hidden = (idx === 0);
}

/* ─────────────────────────────────────────────────────────────
   RENDER QUESTION
───────────────────────────────────────────────────────────── */
function renderQuestion(idx, reverse = false) {
    updateStepTrack(idx);
    const container = document.getElementById('q-slide-container');
    const q = questions[idx];

    const slide = document.createElement('div');
    slide.className = 'q-slide' + (reverse ? ' reverse' : '');

    slide.innerHTML = `
        <div class="q-visual">
            <div class="q-visual-inner">
                <div class="q-visual-emoji">${Q_ICONS[idx] || '🌿'}</div>
                <div class="q-visual-label">場景 ${idx+1}</div>
            </div>
        </div>
        <div class="q-text">Q${idx+1}. ${q.q.replace(/^Q\d+\.\s*/, '')}</div>
        <div class="opts-wrap" id="opts-wrap"></div>
    `;

    const wrap = slide.querySelector('#opts-wrap');
    q.opts.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerHTML = `<div class="opt-badge">${BADGE[i]}</div><span>${o.t}</span>`;
        btn.addEventListener('click', () => handleAnswer(o.s, btn));
        wrap.appendChild(btn);
    });

    container.innerHTML = '';
    container.appendChild(slide);
}

/* ─────────────────────────────────────────────────────────────
   HANDLE ANSWER
───────────────────────────────────────────────────────────── */
function handleAnswer(scoreObj, btn) {
    document.querySelectorAll('.btn-opt').forEach(b => b.disabled = true);
    btn.classList.add('selected');

    // 記錄本題答案，供返回時扣分
    history.push(scoreObj);

    // 加分
    for (let k in scoreObj) scores[k] += scoreObj[k];

    currentIdx++;

    if (currentIdx < questions.length) {
        const slide = document.querySelector('.q-slide');
        if(slide) {
            slide.classList.add('leaving');
            setTimeout(() => renderQuestion(currentIdx), 280);
        }
    } else {
        setTimeout(() => {
            showPage('loading-page');
            setTimeout(showResult, 1800);
        }, 350);
    }
}

/* ─────────────────────────────────────────────────────────────
   GO BACK
───────────────────────────────────────────────────────────── */
function goBack() {
    if (currentIdx === 0) return;

    // 扣回上一題的分數
    const last = history.pop();
    for (let k in last) scores[k] -= last[k];

    currentIdx--;

    const slide = document.querySelector('.q-slide');
    if(slide) {
        slide.classList.add('leaving-reverse');
        setTimeout(() => renderQuestion(currentIdx, true), 280);
    } else {
        renderQuestion(currentIdx, true);
    }
}

/* ─────────────────────────────────────────────────────────────
   SHOW RESULT
───────────────────────────────────────────────────────────── */
function showResult() {
    showPage('result-page');

    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);

    const r1 = sorted[0][1] || 1;
    const r2 = sorted[1][1] || 0.5;
    const r3 = sorted[2][1] || 0.2;

    // 新計分邏輯：依領先幅度動態調整主體質權重
    const leadGap = r1 / (r2 + 0.1);
    const multiplier = 1.25 + (Math.min(leadGap, 3) / 3) * 0.55;
    let s1 = r1 * multiplier * (0.98 + Math.random() * 0.04);
    let s2 = r2 * (0.98 + Math.random() * 0.04);
    let s3 = r3 * (0.98 + Math.random() * 0.04);

    const total = s1 + s2 + s3;
    let p1 = Math.round(s1/total*100);
    if(p1 < 45) p1 = 45;
    if(p1 > 78) p1 = 78;
    let p2 = Math.round((100 - p1) * (s2 / (s2 + s3 + 0.1)));
    let p3 = 100 - p1 - p2;

    const mainK = sorted[0][0];
    const subK  = sorted[1][0];
    const main  = personaData[mainK];
    const sub   = personaData[subK];

    // Persona 顯示
    document.getElementById('res-name').textContent = main.n;
    // 角色圖片
    const resImg = document.getElementById('res-img');
    if(resImg && main.img) resImg.src = main.img;

    // 悄悄話：主描述 + 副角 sub + 建議，拼成一段
    const adviceText = [main.main, mainK !== subK ? sub.sub : '', main.adv]
        .filter(Boolean).join('');
    document.getElementById('res-advice').innerHTML = adviceText;

    // 能量條 — 依百分比高至低排序後再渲染
    const roleLabels = ['顯性靈魂', '隱性基因', '潛在因子'];
    const topThree = [sorted[0][0], sorted[1][0], sorted[2][0]];
    const pcts = [p1, p2, p3];

    // 確保 pcts 降冪排列（理論上已是，但防止 clamp 後亂序）
    const combined = topThree.map((key, i) => ({ key, pct: pcts[i] }))
        .sort((a, b) => b.pct - a.pct);

    let statsHtml = '';
    combined.forEach(({ key, pct }, i) => {
        const p = personaData[key];
        statsHtml += `
            <div class="stat-row">
                <div class="stat-head">
                    <span class="stat-persona">${p.e} ${p.n}</span>
                    <span class="stat-role">${roleLabels[i]}</span>
                    <span class="stat-pct">${pct}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill" id="bar-${i}" style="background:${p.c}; width:0%"></div>
                </div>
            </div>
        `;
    });
    document.getElementById('stats-render').innerHTML = statsHtml;

    setTimeout(() => {
        combined.forEach(({ pct }, i) => {
            const bar = document.getElementById(`bar-${i}`);
            if(bar) bar.style.width = pct + '%';
        });
    }, 200);

    window._resultName = main.n;
    window._resultEmoji = main.e;
}

/* ─────────────────────────────────────────────────────────────
   SHARE & COPY
───────────────────────────────────────────────────────────── */
function shareResult() {
    const text = `我的草本靈魂是「${window._resultName}」${window._resultEmoji}\n用惟元蔘藥漢方全息掃描，來測測你的體質！`;
    if(navigator.share) {
        navigator.share({ title: '草本靈魂體質檢測', text, url: location.href }).catch(()=>{});
    } else {
        navigator.clipboard && navigator.clipboard.writeText(text + '\n' + location.href);
        showToast('已複製分享文字！');
    }
}

function copyCode() {
    const code = 'WEIYUAN88';
    if(navigator.clipboard) {
        navigator.clipboard.writeText(code).then(() => showToast('折扣碼已複製：' + code));
    } else {
        showToast('折扣碼：' + code);
    }
}

function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `
        position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
        background:#1E3020; color:#fff; padding:12px 24px;
        border-radius:100px; font-family:var(--serif); font-size:0.85rem;
        font-weight:600; letter-spacing:1px; z-index:999;
        box-shadow:0 4px 20px rgba(0,0,0,0.25);
        animation: fadeUp 0.3s ease both;
    `;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}
</script>
